<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Animaster</title>
    <style>
        body { font-family: Arial, sans-serif; display: flex; flex-wrap: wrap; padding: 20px; }
        .container { border: 1px solid #ccc; border-radius: 8px; padding: 15px; margin: 10px; width: 250px; }
        .controls { margin-bottom: 20px; display: flex; gap: 5px; flex-wrap: wrap; align-items: center; }
        .title { font-weight: bold; margin-right: auto; }
        .box { height: 150px; border: 1px dashed #aaa; display: flex; align-items: flex-start; }
        .block { width: 50px; height: 50px; background-color: #6a5acd; }
        /* Классы для появления/исчезновения */
        .hide { opacity: 0; }
        .show { opacity: 1; transition-property: opacity, transform; }
    </style>
</head>
<body>

    <div class="container">
        <div class="controls">
            <span class="title">fadeIn</span>
            <button id="fadeInPlay">Play</button>
        </div>
        <div class="box"><div id="fadeInBlock" class="block hide"></div></div>
    </div>

    <div class="container">
        <div class="controls">
            <span class="title">fadeOut</span>
            <button id="fadeOutPlay">Play</button>
        </div>
        <div class="box"><div id="fadeOutBlock" class="block show"></div></div>
    </div>

    <div class="container">
        <div class="controls">
            <span class="title">move</span>
            <button id="movePlay">Play</button>
        </div>
        <div class="box"><div id="moveBlock" class="block"></div></div>
    </div>

    <div class="container">
        <div class="controls">
            <span class="title">scale</span>
            <button id="scalePlay">Play</button>
        </div>
        <div class="box"><div id="scaleBlock" class="block"></div></div>
    </div>

    <div class="container">
        <div class="controls">
            <span class="title">moveAndHide</span>
            <button id="moveAndHidePlay">Play</button>
            <button id="moveAndHideReset">Reset</button>
        </div>
        <div class="box"><div id="moveAndHideBlock" class="block"></div></div>
    </div>

    <div class="container">
        <div class="controls">
            <span class="title">showAndHide</span>
            <button id="showAndHidePlay">Play</button>
        </div>
        <div class="box"><div id="showAndHideBlock" class="block hide"></div></div>
    </div>

    <div class="container">
        <div class="controls">
            <span class="title">heartBeating</span>
            <button id="heartBeatingPlay">Play</button>
            <button id="heartBeatingStop">Stop</button>
        </div>
        <div class="box" style="align-items: center; justify-content: center;">
            <div id="heartBeatingBlock" class="block"></div>
        </div>
    </div>

    <div class="container">
        <div class="controls">
            <span class="title">custom (п.11)</span>
            <button id="customPlay">Play</button>
        </div>
        <div class="box"><div id="customBlock" class="block"></div></div>
    </div>

    <script src="index.js"></script>
</body>
</html>
